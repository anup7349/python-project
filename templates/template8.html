<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    color: #2b2b2b;
    font-size: 10.5px;
    line-height: 1.28;
}

/* Header */
.header {
    background: #f3f6f9;
    border-left: 6px solid #0f766e;
    padding: 14px 20px;
}

.name {
    font-size: 23px;
    font-weight: 700;
}

.role {
    color: #0f766e;
    font-size: 11px;
    margin-top: 2px;
}

.contact {
    font-size: 10px;
    margin-top: 6px;
    color: #555;
    word-break: break-word;
}

/* Content */
.content {
    padding: 14px 20px;
}

.section {
    margin-bottom: 9px;
}

h2 {
    font-size: 11px;
    color: #0f766e;
    margin: 0 0 4px;
    text-transform: uppercase;
    border-bottom: 1px solid #ccc;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    line-height: 1.3;
    word-break: break-word;
}
</style>

</head>

<body>

<div class="header">
    <div class="name">{{name}}</div>
    
    <div class="contact">
        {{phone}} | {{email}} | {{linkedin}} | {{github}}
    </div>
</div>

<div class="content">

    <div class="section">
        <h2>Professional Summary</h2>
        <div class="text">{{summary}}</div>
    </div>

    <div class="section">
        <h2>Experience</h2>
        <div class="text">{{experience}}</div>
    </div>

    <div class="section">
        <h2>Projects</h2>
        <div class="text">{{project_desc}}</div>
    </div>

    <div class="section">
        <h2>Education</h2>
        <div class="text">{{education}}</div>
    </div>

    <div class="section">
        <h2>Technical Skills</h2>
        <div class="text">{{skills}}</div>
    </div>

    <div class="section">
        <h2>Certifications</h2>
        <div class="text">{{certifications}}</div>
    </div>

    <div class="section">
        <h2>Soft Skills</h2>
        <div class="text">{{soft_skills}}</div>
    </div>

</div>

</body>
</html>
