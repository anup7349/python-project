<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    font-size: 10.5px;
    color: #222;
    line-height: 1.28;
}

.wrapper {
    padding: 14px 18px;
}

/* Header */
.namebar {
    background: #111827;
    color: white;
    padding: 12px 16px;
    border-radius: 6px;
}

.name {
    font-size: 22px;
    font-weight: 700;
}

.role {
    font-size: 11px;
    margin-top: 2px;
    color: #d1d5db;
}

.contact {
    font-size: 9.8px;
    color: #e5e7eb;
    margin-top: 4px;
    word-break: break-word;
}

/* Cards Layout */
.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
    margin-top: 10px;
}

.card {
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 8px;
}

.card.full {
    grid-column: 1 / 3;
}

/* Section */
h2 {
    margin: 0 0 4px;
    font-size: 11px;
    color: #111827;
    text-transform: uppercase;
    border-bottom: 1px solid #ccc;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    line-height: 1.3;
    word-break: break-word;
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- Header -->
    <div class="namebar">
        <div class="name">{{name}}</div>
        
        <div class="contact">
            {{phone}} | {{email}} | {{linkedin}} | {{github}}
        </div>
    </div>

    <!-- Cards -->
    <div class="cards">

        <div class="card full">
            <h2>Summary</h2>
            <div class="text">{{summary}}</div>
        </div>

        <div class="card">
            <h2>Education</h2>
            <div class="text">{{education}}</div>
        </div>

        <div class="card">
            <h2>Skills</h2>
            <div class="text">{{skills}}</div>
        </div>

        <div class="card full">
            <h2>Projects</h2>
            <div class="text">{{project_desc}}</div>
        </div>

        <div class="card">
            <h2>Experience</h2>
            <div class="text">{{experience}}</div>
        </div>

        <div class="card">
            <h2>Certifications</h2>
            <div class="text">{{certifications}}</div>
        </div>

        <div class="card full">
            <h2>Soft Skills</h2>
            <div class="text">{{soft_skills}}</div>
        </div>

    </div>

</div>

</body>
</html>
