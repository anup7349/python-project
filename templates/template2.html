<!DOCTYPE html>
<html>
<head>
<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #2c3e50;
    font-size: 11px;
}

.container {
    display: flex;
}

/* LEFT SIDEBAR */
.sidebar {
    width: 32%;
    background: #ecf0f1;
    padding: 18px;
}

.sidebar img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: auto;
}

.section-title {
    margin-top: 18px;
    font-size: 12px;
    font-weight: bold;
    color: #34495e;
    border-bottom: 1px solid #bdc3c7;
    padding-bottom: 2px;
}

.sidebar p {
    font-size: 11px;
    margin: 4px 0;
    word-break: break-word;
}

/* RIGHT SIDE */
.main {
    width: 68%;
    padding: 18px;
}

.name {
    font-size: 20px;
    font-weight: bold;
}

.role {
    color: #2980b9;
    font-size: 12px;
    margin-bottom: 10px;
}

.section {
    margin-top: 12px;
}

.section h2 {
    font-size: 12px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 2px;
    color: #2c3e50;
}

.item {
    margin-top: 6px;
    line-height: 1.3;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <img src="{{photo}}" alt="Profile Photo">

        <div class="section-title">Contact</div>
        <p>{{phone}}</p>
        <p>{{email}}</p>

        <div class="section-title">Links</div>
        <p><a href="{{linkedin}}" target="_blank">{{linkedin}}</a></p>
        <p><a href="{{github}}" target="_blank">{{github}}</a></p>

        <div class="section-title">Skills</div>
        <p>{{skills}}</p>

        <div class="section-title">Soft Skills</div>
        <p>{{soft_skills}}</p>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <div class="name">{{name}}</div>
        <div class="role">{{role}}</div>

        <div class="section">
            <h2>Profile</h2>
            <div class="item">{{summary}}</div>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <div class="item">{{internship}}</div>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <div class="item">{{project_desc}}</div>
        </div>

        <div class="section">
            <h2>Education</h2>
            <div class="item">{{education}}</div>
        </div>

        <div class="section">
            <h2>Certifications</h2>
            <div class="item">{{certifications}}</div>
        </div>

    </div>

</div>

</body>
</html>
