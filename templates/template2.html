<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}

.container {
    display: flex;
}

/* LEFT SIDEBAR */
.sidebar {
    width: 30%;
    background: #e9eef2;
    padding: 20px;
    text-align: center;
}

.sidebar img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
}

.section-title {
    margin-top: 20px;
    font-weight: bold;
    text-align: left;
}

.sidebar p {
    text-align: left;
    font-size: 13px;
    margin: 5px 0;
}

/* RIGHT SIDE */
.main {
    width: 70%;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.role {
    color: #2a7ab9;
    font-size: 14px;
    margin-bottom: 10px;
}

.section {
    margin-top: 20px;
}

.section h2 {
    border-bottom: 1px solid #aaa;
    padding-bottom: 3px;
}

.item {
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <img src="{{photo}}" alt="Profile Photo">

        <div class="section-title">CONTACT</div>
        <p>{{phone}}</p>
        <p>{{email}}</p>

        <div class="section-title">LINKEDIN</div>
        <p><a href="{{linkedin}}" target="_blank">{{linkedin}}</a></p>

        <div class="section-title">GITHUB</div>
        <p><a href="{{github}}" target="_blank">{{github}}</a></p>

        <div class="section-title">SKILLS</div>
        <p>{{skills}}</p>

        <div class="section-title">SOFT SKILLS</div>
        <p>{{soft_skills}}</p>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h1>{{name}}</h1>
        <div class="role">{{role}}</div>

        <div class="section">
            <h2>SUMMARY</h2>
            <p>{{summary}}</p>
        </div>

        <div class="section">
            <h2>EXPERIENCE</h2>
            <div class="item">{{internship}}</div>
        </div>

        <div class="section">
            <h2>PROJECTS</h2>
            <div class="item">{{project_desc}}</div>
        </div>

        <div class="section">
            <h2>EDUCATION</h2>
            <div class="item">{{education}}</div>
        </div>

        <div class="section">
            <h2>CERTIFICATIONS</h2>
            <div class="item">{{certifications}}</div>
        </div>

    </div>

</div>

</body>
</html>
