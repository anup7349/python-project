<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-size: 10.5px;
    color: #172033;
    line-height: 1.28;
}

.layout {
    display: flex;
    min-height: 100vh;
}

.left {
    width: 34%;
    background: #eef2ff;
    padding: 18px 14px;
}

.right {
    width: 66%;
    padding: 18px 20px;
}

.name {
    font-size: 22px;
    font-weight: 700;
    color: #1e3a8a;
}

.role {
    font-size: 11px;
    margin-top: 2px;
    color: #334155;
}

.contact {
    font-size: 9.8px;
    line-height: 1.35;
    margin-top: 7px;
    word-break: break-word;
}

h2 {
    font-size: 11px;
    text-transform: uppercase;
    color: #1e3a8a;
    margin: 11px 0 4px;
    border-bottom: 1px solid #c7d2fe;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    line-height: 1.3;
    word-break: break-word;
}
</style>
</head>

<body>

<div class="layout">

    <div class="left">
        <div class="name">{{name}}</div>
     

        <div class="contact">
            {{phone}}<br>
            {{email}}<br>
            {{linkedin}}<br>
            {{github}}
        </div>

        <h2>Education</h2>
        <div class="text">{{education}}</div>

        <h2>Skills</h2>
        <div class="text">{{skills}}</div>

        <h2>Soft Skills</h2>
        <div class="text">{{soft_skills}}</div>
    </div>

    <div class="right">
        <h2>Professional Summary</h2>
        <div class="text">{{summary}}</div>

        <h2>Projects</h2>
        <div class="text">{{project_desc}}</div>

        <h2>Internship Experience</h2>
        <div class="text">{{experience}}</div>

        <h2>Certifications</h2>
        <div class="text">{{certifications}}</div>
    </div>

</div>

</body>
</html>
