<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 14px;
    color: #202124;
    font-size: 10.5px;
    line-height: 1.28;
}

/* Header */
.header {
    border-bottom: 3px solid #10b981;
    padding-bottom: 6px;
    margin-bottom: 8px;
}

.name {
    font-size: 23px;
    font-weight: 800;
}

.role {
    font-size: 11px;
    margin-top: 2px;
    color: #444;
}

.contact {
    font-size: 9.8px;
    color: #555;
    margin-top: 4px;
    word-break: break-word;
}

/* Sections */
.section {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.label {
    width: 28%;
    font-size: 10.5px;
    font-weight: bold;
    text-transform: uppercase;
    color: #047857;
}

.text {
    width: 72%;
    white-space: pre-line;
    word-break: break-word;
    line-height: 1.3;
}
</style>

</head>

<body>

<div class="header">
    <div class="name">{{name}}</div>
    
    <div class="contact">
        {{phone}} | {{email}} | {{linkedin}} | {{github}}
    </div>
</div>

<div class="section">
    <div class="label">Summary</div>
    <div class="text">{{summary}}</div>
</div>

<div class="section">
    <div class="label">Education</div>
    <div class="text">{{education}}</div>
</div>

<div class="section">
    <div class="label">Skills</div>
    <div class="text">{{skills}}</div>
</div>

<div class="section">
    <div class="label">Experience</div>
    <div class="text">{{experience}}</div>
</div>

<div class="section">
    <div class="label">Projects</div>
    <div class="text">{{project_desc}}</div>
</div>

<div class="section">
    <div class="label">Certificates</div>
    <div class="text">{{certifications}}</div>
</div>

<div class="section">
    <div class="label">Soft Skills</div>
    <div class="text">{{soft_skills}}</div>
</div>

</body>
</html>
