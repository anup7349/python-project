<!DOCTYPE html>
<html>
<head>
<style>
@page { size: A4; margin: 12px; }

body {
    font-family: 'Segoe UI', sans-serif;
    font-size: 11px;
    margin: 10px;
    color: #2d2d2d;
}

.header {
    text-align: center;
    margin-bottom: 8px;
}

.name {
    font-size: 20px;
    font-weight: bold;
}

.contact {
    font-size: 10px;
    color: #555;
}

.section {
    margin-top: 8px;
}

.section-title {
    font-weight: bold;
    font-size: 12px;
    color: #1e6f8c;
    border-bottom: 1px solid #ccc;
}

.content {
    margin-top: 3px;
    line-height: 1.3;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="header">
    <div class="name">{{name}}</div>
    <div class="contact">
        {{phone}} | {{email}} | {{linkedin}} | {{github}}
    </div>
</div>

<div class="section">
    <div class="section-title">Profile</div>
    <div class="content">{{summary}}</div>
</div>

<div class="section">
    <div class="section-title">Experience</div>
    <div class="content">{{internship}}</div>
</div>

<div class="section">
    <div class="section-title">Education</div>
    <div class="content">{{education}}</div>
</div>

<div class="section">
    <div class="section-title">Skills</div>
    <div class="content">{{skills}}</div>
</div>

<div class="section">
    <div class="section-title">Projects</div>
    <div class="content">{{project_desc}}</div>
</div>

<div class="section">
    <div class="section-title">Certifications</div>
    <div class="content">{{certifications}}</div>
</div>

<div class="section">
    <div class="section-title">Soft Skills</div>
    <div class="content">{{soft_skills}}</div>
</div>

</body>
</html>
