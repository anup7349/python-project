<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    font-family: Georgia, 'Times New Roman', serif;
    margin: 16px;
    color: #262626;
    font-size: 10.5px;
    line-height: 1.3;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 8px;
}

.name {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
}

.role {
    font-size: 11px;
    margin-top: 2px;
    color: #555;
}

.contact {
    font-family: Arial, sans-serif;
    font-size: 9.8px;
    margin-top: 4px;
    color: #444;
    word-break: break-word;
}

/* Sections */
h2 {
    font-family: Arial, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 9px 0 4px;
    color: #5b4636;
    border-bottom: 1px solid #b9a99b;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    word-break: break-word;
    line-height: 1.3;
}
</style>

</head>

<body>

<div class="header">
    <div class="name">{{name}}</div>
    
    <div class="contact">
        {{phone}} | {{email}} | {{linkedin}} | {{github}}
    </div>
</div>

<h2>Profile</h2>
<div class="text">{{summary}}</div>

<h2>Education</h2>
<div class="text">{{education}}</div>

<h2>Experience</h2>
<div class="text">{{experience}}</div>

<h2>Projects</h2>
<div class="text">{{project_desc}}</div>

<h2>Skills</h2>
<div class="text">{{skills}}</div>

<h2>Certifications</h2>
<div class="text">{{certifications}}</div>

<h2>Soft Skills</h2>
<div class="text">{{soft_skills}}</div>

</body>
</html>
