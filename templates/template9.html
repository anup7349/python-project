<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    font-family: Arial, sans-serif;
    margin: 14px;
    color: #1e293b;
    font-size: 10.5px;
    line-height: 1.28;
}

/* Header */
.head {
    display: flex;
    gap: 14px;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 2px solid #64748b;
}

.photo {
    width: 75px;
    height: 75px;
    border-radius: 8px;
    object-fit: cover;
    background: #e2e8f0;
}

.name {
    font-size: 22px;
    font-weight: bold;
}

.role {
    font-size: 11px;
    color: #475569;
    margin-top: 2px;
}

.contact {
    font-size: 9.8px;
    color: #475569;
    margin-top: 4px;
    word-break: break-word;
}

/* Sections */
h2 {
    font-size: 11px;
    color: #334155;
    margin: 8px 0 4px;
    text-transform: uppercase;
    border-bottom: 1px solid #cbd5e1;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    line-height: 1.3;
    word-break: break-word;
}
</style>

</head>

<body>

<div class="head">
    <img class="photo" src="{{photo}}" alt="">

    <div>
        <div class="name">{{name}}</div>
        
        <div class="contact">
            {{phone}} | {{email}} | {{linkedin}} | {{github}}
        </div>
    </div>
</div>

<h2>Summary</h2>
<div class="text">{{summary}}</div>

<h2>Projects</h2>
<div class="text">{{project_desc}}</div>

<h2>Technical Skills</h2>
<div class="text">{{skills}}</div>

<h2>Experience</h2>
<div class="text">{{experience}}</div>

<h2>Education</h2>
<div class="text">{{education}}</div>

<h2>Certifications</h2>
<div class="text">{{certifications}}</div>

<h2>Soft Skills</h2>
<div class="text">{{soft_skills}}</div>

</body>
</html>
