<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 10px;
}

body {
    font-family: Arial, sans-serif;
    margin: 14px;
    color: #1f2937;
    font-size: 10.5px;
    line-height: 1.28;
}

/* Header */
.top {
    display: flex;
    justify-content: space-between;
    border-bottom: 2px solid #2563eb;
    padding-bottom: 7px;
}

.name {
    font-size: 22px;
    font-weight: bold;
}

.role {
    color: #2563eb;
    margin-top: 2px;
    font-size: 11px;
}

.contact {
    font-size: 9.8px;
    text-align: right;
    line-height: 1.35;
    word-break: break-word;
}

/* Grid layout */
.grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 14px;
    margin-top: 10px;
}

/* Sections */
h2 {
    font-size: 11px;
    color: #2563eb;
    margin: 0 0 4px;
    text-transform: uppercase;
    border-bottom: 1px solid #ccc;
    padding-bottom: 2px;
}

.section {
    margin-bottom: 10px;
}

.text {
    white-space: pre-line;
    line-height: 1.3;
    word-break: break-word;
}
</style>

</head>

<body>

<div class="top">
    <div>
        <div class="name">{{name}}</div>
        
    </div>

    <div class="contact">
        {{phone}}<br>
        {{email}}<br>
        {{linkedin}}<br>
        {{github}}
    </div>
</div>

<div class="grid">

    <!-- LEFT SIDE -->
    <div>
        <div class="section">
            <h2>Education</h2>
            <div class="text">{{education}}</div>
        </div>

        <div class="section">
            <h2>Technical Skills</h2>
            <div class="text">{{skills}}</div>
        </div>

        <div class="section">
            <h2>Certifications</h2>
            <div class="text">{{certifications}}</div>
        </div>

        <div class="section">
            <h2>Soft Skills</h2>
            <div class="text">{{soft_skills}}</div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div>
        <div class="section">
            <h2>Profile</h2>
            <div class="text">{{summary}}</div>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <div class="text">{{project_desc}}</div>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <div class="text">{{experience}}</div>
        </div>
    </div>

</div>

</body>
</html>
