<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 12px;
}

body {
    font-family: Arial, sans-serif;
    margin: 16px;
    color: #111;
    font-size: 10.8px;
    line-height: 1.28;
}

.header {
    border-bottom: 2px solid #111;
    padding-bottom: 7px;
    margin-bottom: 8px;
}

.name {
    font-size: 23px;
    font-weight: bold;
}

.role {
    font-size: 11px;
    color: #444;
    margin-top: 2px;
}

.contact {
    font-size: 10px;
    margin-top: 4px;
    color: #333;
    word-break: break-word;
}

h2 {
    font-size: 11.5px;
    margin: 9px 0 4px;
    text-transform: uppercase;
    border-bottom: 1px solid #222;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    word-break: break-word;
}
</style>
</head>

<body>

<div class="header">
    <div class="name">{{name}}</div>
    
    <div class="contact">
        {{phone}} | {{email}} | {{linkedin}} | {{github}}
    </div>
</div>

<h2>Summary</h2>
<div class="text">{{summary}}</div>

<h2>Education</h2>
<div class="text">{{education}}</div>

<h2>Technical Skills</h2>
<div class="text">{{skills}}</div>

<h2>Projects</h2>
<div class="text">{{project_desc}}</div>

<h2>Internship Experience</h2>
<div class="text">{{experience}}</div>

<h2>Certifications</h2>
<div class="text">{{certifications}}</div>

<h2>Soft Skills</h2>
<div class="text">{{soft_skills}}</div>

</body>
</html>
