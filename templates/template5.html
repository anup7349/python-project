<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
@page {
    size: A4;
    margin: 12px;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #222;
    margin: 16px;
    font-size: 10.8px;
    line-height: 1.28;
}

.header {
    text-align: center;
    border-bottom: 2px solid #222;
    padding-bottom: 7px;
    margin-bottom: 9px;
}

.name {
    font-size: 23px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

.role {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
}

.contact {
    font-size: 10px;
    color: #444;
    margin-top: 4px;
    word-break: break-word;
}

.section {
    margin-top: 8px;
}

h2 {
    font-size: 11.5px;
    margin: 0 0 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 2px;
}

.text {
    white-space: pre-line;
    word-break: break-word;
}
</style>
</head>

<body>

<div class="header">
    <div class="name">{{name}}</div>
    
    <div class="contact">
        {{phone}} | {{email}} | {{linkedin}} | {{github}}
    </div>
</div>

<div class="section">
    <h2>Summary</h2>
    <div class="text">{{summary}}</div>
</div>

<div class="section">
    <h2>Education</h2>
    <div class="text">{{education}}</div>
</div>

<div class="section">
    <h2>Technical Skills</h2>
    <div class="text">{{skills}}</div>
</div>

<div class="section">
    <h2>Internship Experience</h2>
    <div class="text">{{experience}}</div>
</div>

<div class="section">
    <h2>Projects</h2>
    <div class="text">{{project_desc}}</div>
</div>

<div class="section">
    <h2>Certifications</h2>
    <div class="text">{{certifications}}</div>
</div>

<div class="section">
    <h2>Soft Skills</h2>
    <div class="text">{{soft_skills}}</div>
</div>

</body>
</html>
